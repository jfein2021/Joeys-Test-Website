<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        button {
            transition: all 0.2s ease-in-out; /* ⏱️ This makes the animation smooth instead of sudden */
            cursor: pointer;
        }

        /* What happens when the mouse is hovering over the button */
        button:hover {
            transform: scale(1.08); /* 📈 Makes the button grow 8% larger */
            box-shadow: 0px 0px 15px #4da6ff; /* 🌟 Adds a cool neon blue glow */
            background-color: #4da6ff; /* Changes the background color */
            color: black;
        }
        
        body {
            background-image: url('Background.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;           /* Keeps background in place when you scroll (very premium feel!) */
            background-repeat: no-repeat;            /* Prevents the image from repeating like tiles */
            background-color: #333333;               /* Fallback color in case the image fails to load */
            
            color: #ffffff;
            font-family: times new roman;
            display: flex;
            flex-direction: column;  /* Stack everything vertically */
            align-items: center;     /* Center everything horizontally */
            text-align: center;      /* Center-align any plain text lines */
            gap: 20px;               /* Optional: Adds a nice 20px space between all your page sections */
        }
       /* 1. The container that holds both the button and the content */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        /* 2. The physical menu button */
        .dropbtn {
            background-color: #333;
            color: white;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* 3. The dropdown box (hidden by default) */
        .dropdown-content {
            display: none; /* <-- This hides the menu */
            position: absolute;
            background-color: #f1f1f1;
            min-width: 160px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            border-radius: 5px;
            z-index: 1; /* Makes sure the menu floats on top of other content */
            left: 50%;
            transform: translateX(-50%);
            top: 100%; /* Keeps it directly below the button */
        }

        /* 4. Style the links inside the dropdown */
        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block; /* Stack links vertically */
        }

        /* 5. Change link color when hovering over them */
        .dropdown-content a:hover {
            background-color: #ddd;
        }

        /* 6. THE MAGIC TRICK: Show the menu when the user hovers over the container */
        .dropdown:hover .dropdown-content {
            display: block;
        }

        .button-stack {
            display: flex;
            flex-direction: column; /* ↕️ Arranges items vertically */
            gap: 10px;              /* ↕️ Adds a clean 10px space between them */
            width: max-content;     /* 📐 Keeps the column tight around the buttons */
        }
        .button-row {
            display: flex;
            flex-direction: row; /* ↔️ Arranges its children side-by-side */
            gap: 15px;           /* ↔️ Adds a clean 15px space horizontally between them */
        }
    </style>
</head>
